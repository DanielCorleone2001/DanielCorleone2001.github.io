        <h2 id="进程同步"><a href="#进程同步" class="headerlink" title="进程同步"></a>进程同步</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">概念：某些进程的执行需要遵循一定的顺序，相互配合来完成工作。通过进程同步产生制约关系来协调工作次序</span><br></pre></td></tr></table></figure>

<h2 id="进程互斥"><a href="#进程互斥" class="headerlink" title="进程互斥"></a>进程互斥</h2><h3 id="四个部分"><a href="#四个部分" class="headerlink" title="四个部分"></a>四个部分</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">1.进入区：检查是否可进入临界区。可进入则设置正在访问临界区的标志(即上锁)，防止其他进程访问临界区</span><br><span class="line"></span><br><span class="line">2.临界区：访问临界资源</span><br><span class="line"></span><br><span class="line">3.退出区：解除正在访问临界资源的标志(解锁)</span><br><span class="line"></span><br><span class="line">4.剩余区：做其他处理</span><br></pre></td></tr></table></figure>

<h3 id="遵循原则"><a href="#遵循原则" class="headerlink" title="遵循原则"></a>遵循原则</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">1.空闲让进:临界区空闲时允许一个进程进入临界区</span><br><span class="line"></span><br><span class="line">2.忙则等待：临界区繁忙时，其他请求进入临界区的进程必须等待</span><br><span class="line"></span><br><span class="line">3.有限等待：发出访问请求的进程，所等待的时间应为有限时间(保证不饥饿)</span><br><span class="line"></span><br><span class="line">4.让权等待：当进程不能进入临界区时应放弃对处理机的占用</span><br></pre></td></tr></table></figure>
