ne">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//给你一个包含 n 个整数的数组 nums，判断 nums 中是否存在三个元素 a，b，c ，使得 a + b + c = 0 ？请你找出所有和为 0 且不重</span></span><br><span class="line"><span class="comment">//复的三元组。 </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// 注意：答案中不可以包含重复的三元组。 </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// 示例 1： </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">//输入：nums = [-1,0,1,2,-1,-4]</span></span><br><span class="line"><span class="comment">//输出：[[-1,-1,2],[-1,0,1]]</span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// 示例 2： </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">//输入：nums = []</span></span><br><span class="line"><span class="comment">//输出：[]</span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// 示例 3： </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">//输入：nums = [0]</span></span><br><span class="line"><span class="comment">//输出：[]</span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// 提示： </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">// 0 &lt;= nums.length &lt;= 3000 </span></span><br><span class="line"><span class="comment">// -105 &lt;= nums[i] &lt;= 105 </span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">// Related Topics 数组 双指针 </span></span><br><span class="line"><span class="comment">// 👍 2875 👎 0</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">//leetcode submit region begin(Prohibit modification and deletion)</span></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Solution</span> </span>&#123;</span><br><span class="line">    <span class="comment">/**</span></span><br><span class="line"><span class="comment">     * 双指针，时间复杂度为O(n^2)</span></span><br><span class="line"><span class="comment">     * 首先排序，再固定首位，将第二位到最后一位分别慢慢相加，找出是否有和相等的组合</span></span><br><span class="line"><span class="comment">     * 可以不考虑的是：左指针和前一个值相等、右指针和后一个值相等，那么直接跳过不考虑；</span></span><br><span class="line"><span class="comment">     * 如果固定的节点和前一个节点相等，直接跳过</span></span><br><span class="line"><span class="comment">     * 最后是求和运算，如果值大于固定节点的相反数，那么需要左移右节点</span></span><br><span class="line"><span class="comment">     * 如果小于固定节点的相反数，则需要右移左节点</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@param</span> nums</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@return</span></span></span><br><span class="line"><span class="comment">     */</span></span><br><span class="line">    <span class="keyword">public</span> List&lt;List&lt;Integer&gt;&gt; threeSum(<span class="keyword">int</span>[] nums) &#123;</span><br><span class="line">        <span class="comment">//先排序</span></span><br><span class="line">        Arrays.sort(nums);</span><br><span class="line">        List&lt;List&lt;Integer&gt;&gt; res = <span class="keyword">new</span> LinkedList&lt;&gt;();</span><br><span class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i=<span class="number">0</span>; i&lt;nums.length-<span class="number">2</span>; i++) &#123;</span><br><span class="line">            <span class="keyword">if</span> ( i==<span class="number">0</span> || (i&gt;<span class="number">0</span> &amp;&amp; nums[i] != nums[i-<span class="number">1</span>]) ) &#123;</span><br><span class="line">                <span class="keyword">int</span> lower = i+<span class="number">1</span>, higher = nums.length-<span class="number">1</span>, sum = <span class="number">0</span> - nums[i];</span><br><span class="line">                <span class="keyword">while</span> ( lower &lt; higher) &#123;</span><br><span class="line">                    <span class="keyword">if</span> ( nums[lower] + nums[higher] == sum ) &#123;</span><br><span class="line">                        res.add(Arrays.asList(nums[i], nums[lower], nums[higher]) );</span><br><span class="line">                        lower++;higher--;</span><br><span class="line">                        <span class="keyword">while</span> (lower &lt; higher &amp;&amp; (nums[lower] == nums[lower-<span class="number">1</span>]) ) lower++;</span><br><span class="line">                        <span class="keyword">while</span> (lower &lt; higher &amp;&amp; (nums[higher] == nums[higher + <span class="number">1</span>]) ) higher--;</span><br><span class="line">                    &#125;<span class="keyword">else</span> <span class="keyword">if</span> ( nums[lower] + nums[higher] &gt; sum) higher--;</span><br><span class="line">                    <span class="keyword">else</span> lower++;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> res;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">//leetcode submit region end(Prohibit modification and deletion)</span></span><br><span class="line"></span><br></pre></td></tr></table></figure>
