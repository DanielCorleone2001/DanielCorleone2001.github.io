="comment">//</span></span><br><span class="line"><span class="comment">// 示例 3： </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">//输入：nums = [3,3], target = 6</span></span><br><span class="line"><span class="comment">//输出：[0,1]</span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// 提示： </span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">// 2 &lt;= nums.length &lt;= 103 </span></span><br><span class="line"><span class="comment">// -109 &lt;= nums[i] &lt;= 109 </span></span><br><span class="line"><span class="comment">// -109 &lt;= target &lt;= 109 </span></span><br><span class="line"><span class="comment">// 只会存在一个有效答案 </span></span><br><span class="line"><span class="comment">// </span></span><br><span class="line"><span class="comment">// Related Topics 数组 哈希表 </span></span><br><span class="line"><span class="comment">// 👍 10017 👎 0</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">//leetcode submit region begin(Prohibit modification and deletion)</span></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Solution</span> </span>&#123;</span><br><span class="line">    <span class="comment">/**</span></span><br><span class="line"><span class="comment">     * 梦开始的地方</span></span><br><span class="line"><span class="comment">     * 很简单，暴力也行，但最好还是用哈希表</span></span><br><span class="line"><span class="comment">     * 从头开始遍历数组，如果存在target-nums[i]，即目标值，那么就返回这个值的下标以及i</span></span><br><span class="line"><span class="comment">     * 如果没有，那就把它放到哈希表里存着</span></span><br><span class="line"><span class="comment">     * 结束之后如果都没有返回，那就是没有，直接返回一个空数组</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@param</span> nums</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@param</span> target</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@return</span></span></span><br><span class="line"><span class="comment">     */</span></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">int</span>[] twoSum(<span class="keyword">int</span>[] nums, <span class="keyword">int</span> target) &#123;</span><br><span class="line">        <span class="keyword">if</span> ( nums == <span class="keyword">null</span>) <span class="keyword">return</span> <span class="keyword">new</span> <span class="keyword">int</span>[<span class="number">0</span>];</span><br><span class="line">        Map&lt;Integer,Integer&gt; hashMap = <span class="keyword">new</span> HashMap&lt;&gt;();</span><br><span class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i=<span class="number">0</span>; i&lt; nums.length; i++ ) &#123;</span><br><span class="line">            <span class="keyword">if</span> ( hashMap.containsKey( target - nums[i] )) &#123;</span><br><span class="line">                <span class="keyword">return</span> <span class="keyword">new</span> <span class="keyword">int</span>[]&#123; hashMap.get(target-nums[i]), i &#125;;</span><br><span class="line">            &#125;<span class="keyword">else</span> &#123;</span><br><span class="line">                hashMap.put( nums[i], i );</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> <span class="keyword">new</span> <spa
